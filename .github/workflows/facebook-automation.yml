name: Daily AU News Automation

on:
  schedule:
    - cron: '0 23 * * *' # 9 AM Brisbane (23:00 UTC)
    - cron: '0 2 * * *'  # 12 PM Brisbane (02:00 UTC)
    - cron: '0 8 * * *'  # 6 PM Brisbane (08:00 UTC)
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests google-generativeai

      - name: Execute News Bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
        run: python simple_automation.py
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: logs
          path: logs/
          retention-days: 7
      
      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "❌ Facebook automation failed. Check logs for details."
