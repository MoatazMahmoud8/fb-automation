name: Facebook Automation - Daily Posts

on:
  schedule:
    # Run at 9:00 AM AEST (23:00 UTC previous day)
    - cron: '0 23 * * *'
    # Run at 12:00 PM AEST (02:00 UTC same day)
    - cron: '0 2 * * *'
    # Run at 6:00 PM AEST (08:00 UTC same day)
    - cron: '0 8 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  automate-facebook-posts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests (optional)
        run: |
          python -m src.main --test
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        continue-on-error: true
      
      - name: Execute Facebook Automation
        run: |
          python -m src.main
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          LOG_LEVEL: INFO
      
      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: logs
          path: logs/
          retention-days: 7
      
      - name: Notify on failure (optional)
        if: failure()
        run: |
          echo "❌ Facebook automation failed. Check logs for details."
