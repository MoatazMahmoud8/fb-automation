name: Daily AU News Automation

on:
  schedule:
    - cron: '0 23 * * *' # 9 AM Brisbane (23:00 UTC)
    - cron: '0 2 * * *'  # 12 PM Brisbane (02:00 UTC)
    - cron: '0 8 * * *'  # 6 PM Brisbane (08:00 UTC)
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_EMAIL: ${{ secrets.FB_EMAIL }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
          FB_PAGE_NAME: ${{ secrets.FB_PAGE_NAME }}
        run: python main.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshot_*.png
          if-no-files-found: ignore
